apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyberheal-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: cyberheal.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cyberheal-backend
            port:
              number: 80
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: cyberheal-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cyberheal-frontend
            port:
              number: 80
