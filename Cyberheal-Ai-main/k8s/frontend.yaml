apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberheal-frontend
  labels:
    app: cyberheal-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyberheal-frontend
  template:
    metadata:
      labels:
        app: cyberheal-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/yourorg/cyberheal-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cyberheal-frontend
spec:
  selector:
    app: cyberheal-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
