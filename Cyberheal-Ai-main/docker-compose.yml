version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DB_URL=postgresql://cyberheal:password@db:5432/cyberheal_db
      - SECRET_KEY=${SECRET_KEY:-default_secret_key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - MOCK_AUTH=True
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cyberheal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cyberheal_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberheal"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
